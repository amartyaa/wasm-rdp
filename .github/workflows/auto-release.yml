name: Auto Version and Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version-bump:
    name: Calculate Next Version
    runs-on: ubuntu-latest
    outputs:
      next_version: ${{ steps.calc.outputs.next_version }}
      skip: ${{ steps.calc.outputs.skip }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Next Version
        id: calc
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "Latest tag: $LATEST_TAG"
          
          # Remove 'v' prefix
          VERSION=${LATEST_TAG#v}
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Get commit message
          COMMIT_MSG=$(git log -1 --pretty=%B)
          echo "Commit message: $COMMIT_MSG"
          
          # Check for unpublished major release (draft releases)
          DRAFT_TAGS=$(gh api "repos/${{ github.repository }}/releases" --jq '.[] | select(.draft == true) | .tag_name' 2>/dev/null || true)
          
          NEXT_VERSION=""
          for DRAFT in $DRAFT_TAGS; do
              D_VER=${DRAFT#v}
              IFS='.' read -r D_MAJOR D_MINOR D_PATCH <<< "$D_VER"
              # If draft major version is greater than current major version, use it
              if [ "$D_MAJOR" -gt "$MAJOR" ]; then
                  NEXT_VERSION="$DRAFT"
                  echo "Found unpublished major release draft: $NEXT_VERSION"
                  break
              fi
          done
          
          if [ -z "$NEXT_VERSION" ]; then
              # Detect feat, fix, or chore case-insensitively at the start of the commit
              if echo "$COMMIT_MSG" | grep -qiE "^feat"; then
                  MINOR=$((MINOR + 1))
                  PATCH=0
                  echo "Detected 'feat', bumping minor version."
              elif echo "$COMMIT_MSG" | grep -qiE "^(fix|chore)"; then
                  PATCH=$((PATCH + 1))
                  echo "Detected 'fix/chore', bumping patch version."
              else
                  echo "No feat/fix/chore detected. Skipping release."
                  echo "skip=true" >> $GITHUB_OUTPUT
                  exit 0
              fi
              NEXT_VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          
          echo "Next version will be: $NEXT_VERSION"
          echo "next_version=$NEXT_VERSION" >> $GITHUB_OUTPUT
          echo "skip=false" >> $GITHUB_OUTPUT

  build-release:
    name: Build & Release
    needs: version-bump
    if: needs.version-bump.outputs.skip == 'false'
    uses: ./.github/workflows/release.yml
    with:
      tag_name: ${{ needs.version-bump.outputs.next_version }}
